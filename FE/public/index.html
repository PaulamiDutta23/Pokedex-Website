<html>

<head>
  <title>Pokedex</title>
  <link rel="stylesheet" href="/styles/style.css">
  <link rel="stylesheet" href="/styles/colors.css">
  <style>
    .all a {
      color: white;
    }
  </style>
</head>

<body>
  <div class="main">
    <div class="sidebar">
      <ul class="sidebar-contents">
        <li class="all"><a href="/index">All</a></li>
      </ul>
    </div>
    <div class="gallery">
      <div class="search-bar">
        <form action="/search" method="get">
          <input type="text" name="pokemon" id="pokemon" placeholder="Search Pokemon by Name">
          <button type="submit">Search</button>
        </form>
      </div>
      <div class="card-container">
        <div class="card">

          <div class="img-container"
            style="background: linear-gradient(135deg,hsl(var(--poison) / 50%), hsl(var(--grass) / 50%),transparent);">
            <img
              src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png"
              alt="This is an image of Bulbasaur">
          </div>
          <div class="header">
            <h2>
              Bulbasaur
            </h2>
            <div class="types">
              <div class="type grass">
                Grass
              </div>
              <div class="type poison">
                Poison
              </div>
            </div>
          </div>
          <table class="stats">
            <tr>
              <td class="data">Weight</td>
              <td class="right-align">
                69
              </td>
            </tr>
            <tr>
              <td class="data">Base XP</td>
              <td class="right-align">
                64
              </td>
            </tr>
            <tr>
              <td class="data">HP</td>
              <td class="right-align">
                45
              </td>
            </tr>
            <tr>
              <td class="data">Attack</td>
              <td class="right-align">
                49
              </td>
            </tr>
            <tr>
              <td class="data">Defense</td>
              <td class="right-align">
                49
              </td>
            </tr>
            <tr>
              <td class="data">Speed</td>
              <td class="right-align">
                45
              </td>
            </tr>
          </table>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
